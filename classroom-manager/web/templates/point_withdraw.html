{% extends "base.html" %}
{% from "macros.html" import bean_icon %}

{% block title %}콩 차감 — 묘동 유치원{% endblock %}

{% block content %}
<div class="page-container page-container--narrow">
  <section class="form-card form-card--withdraw">
    <header class="form-card__header">
      <p class="page-eyebrow page-eyebrow--warning">🫘 콩 차감</p>
      <h1 class="form-card__title">{{ child.child_name }}</h1>
      <div class="balance-box">
        <span class="balance-box__label">현재 잔액</span>
        <span class="balance-box__value">
          {{ bean_icon('sm') }}
          <strong>{{ balance }}{{ currency_name }}</strong>
        </span>
      </div>
    </header>

    <form method="post" action="/children/{{ child.id }}/points/withdraw" class="form">
      <div class="form-group">
        <label for="amount">차감할 {{ currency_name }} 수량</label>
        <input
          type="number"
          class="form-input"
          id="amount"
          name="amount"
          min="1"
          max="{{ balance }}"
          step="1"
          required
          placeholder="1"
          inputmode="numeric"
        />
        <p class="hint hint--box">최대 {{ balance }}{{ currency_name }}까지 차감할 수 있어요.</p>
      </div>
      <div class="form-group">
        <label for="memo">메모 (선택)</label>
        <input
          type="text"
          class="form-input"
          id="memo"
          name="memo"
          maxlength="200"
          placeholder="예: 규칙 위반"
        />
      </div>
      <div class="form-actions">
        <a href="/classes/manage" class="btn btn-secondary">취소</a>
        <button type="submit" class="btn btn-warning">차감하기</button>
      </div>
    </form>
  </section>
</div>
{% endblock %}
