{% extends "qr_base.html" %}
{% from "macros.html" import bean_icon %}

{% block title %}{{ child.child_name }} 지급{% endblock %}

{% block content %}
<section class="qr-panel">
  <p class="qr-panel__eyebrow">➕ 지급</p>
  <h1 class="qr-panel__title">{{ child.child_name }}</h1>
  <div class="balance-box balance-box--inline">
    <span class="balance-box__label">현재 잔액</span>
    <span class="balance-box__value">
      {{ bean_icon('sm') }}
      <strong>{{ balance }}{{ currency_name }}</strong>
    </span>
  </div>

  <form method="post" action="/qr/children/{{ child.id }}/deposit" class="form">
    <div class="form-group">
      <label for="amount">지급할 {{ currency_name }} 수량</label>
      <input
        type="number"
        class="form-input form-input--lg"
        id="amount"
        name="amount"
        min="1"
        step="1"
        required
        placeholder="1"
        inputmode="numeric"
        autofocus
      />
    </div>
    <div class="form-group">
      <label for="memo">메모 (선택)</label>
      <input
        type="text"
        class="form-input"
        id="memo"
        name="memo"
        maxlength="200"
        placeholder="예: 숙제 잘함"
      />
    </div>
    <div class="qr-form-actions">
      <a href="/qr/children/{{ child.id }}" class="btn btn-secondary">뒤로</a>
      <button type="submit" class="btn btn-success btn-lg">지급하기</button>
    </div>
  </form>
</section>
{% endblock %}
