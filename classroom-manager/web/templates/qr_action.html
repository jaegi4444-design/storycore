{% extends "qr_base.html" %}
{% from "macros.html" import bean_icon %}

{% block title %}{{ child.child_name }} — QR 입금·출금{% endblock %}

{% block content %}
<section class="qr-panel">
  <p class="qr-panel__eyebrow">📱 QR 스캔</p>
  <h1 class="qr-panel__title">{{ child.child_name }}</h1>
  <div class="balance-box balance-box--inline">
    <span class="balance-box__label">현재 잔액</span>
    <span class="balance-box__value">
      {{ bean_icon('sm') }}
      <strong>{{ balance }}{{ currency_name }}</strong>
    </span>
  </div>

  <form method="post" action="/qr/children/{{ child.id }}" class="form qr-quick-form">
    <div class="form-group">
      <label for="amount">{{ currency_name }} 수량</label>
      <input
        type="number"
        class="form-input form-input--lg"
        id="amount"
        name="amount"
        min="1"
        step="1"
        required
        placeholder="1"
        inputmode="numeric"
        autofocus
      />
    </div>
    <div class="form-group">
      <label for="memo">메모 (선택)</label>
      <input
        type="text"
        class="form-input"
        id="memo"
        name="memo"
        maxlength="200"
        placeholder="예: 숙제 잘함"
      />
    </div>
    <div class="qr-submit-grid">
      <button type="submit" name="action" value="deposit" class="btn btn-success btn-lg">
        입금하기
      </button>
      <button type="submit" name="action" value="withdraw" class="btn btn-warning btn-lg">
        출금하기
      </button>
    </div>
    <p class="hint hint--center">수량 입력 후 원하는 버튼을 누르면 바로 처리됩니다.</p>
  </form>
</section>
{% endblock %}
