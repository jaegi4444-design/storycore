{% extends "base.html" %}
{% from "macros.html" import bean_icon %}

{% block title %}메인 — 묘동 유치원{% endblock %}

{% block content %}
<section class="card welcome-hero">
  <div class="welcome-emoji">👋</div>
  <h1 class="page-title">안녕하세요, {{ user.name }} 선생님!</h1>

  <div class="welcome-actions" style="margin-top: 10px;">
    {% if school_class %}
    <a href="/classes/manage" class="btn btn-primary btn-lg">내 반 관리하기</a>
    {% else %}
    <a href="/classes/create" class="btn btn-primary btn-lg">우리 반 만들기</a>
    {% endif %}
  </div>
</section>
{% endblock %}
