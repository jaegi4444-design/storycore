{% extends "base.html" %}
{% from "macros.html" import bean_icon %}

{% block title %}콩 지급 — 묘동 유치원{% endblock %}

{% block content %}
<section class="card card-narrow">
  <p class="page-eyebrow">🫘 콩 지급</p>
  <h1 class="page-title">{{ child.child_name }}</h1>
  <p class="text-muted">
    현재 잔액:
    <span class="balance-highlight">{{ bean_icon('sm') }} <strong>{{ balance }}{{ currency_name }}</strong></span>
  </p>

  <form method="post" action="/children/{{ child.id }}/points/deposit" class="form">
    <div class="form-group">
      <label for="amount">지급할 {{ currency_name }} 수량</label>
      <input
        type="number"
        id="amount"
        name="amount"
        min="1"
        step="1"
        required
        placeholder="1"
        inputmode="numeric"
      />
    </div>
    <div class="form-group">
      <label for="memo">메모 (선택)</label>
      <input type="text" id="memo" name="memo" maxlength="200" placeholder="예: 숙제 잘함" />
    </div>
    <div class="form-actions">
      <a href="/classes/manage" class="btn btn-secondary">취소</a>
      <button type="submit" class="btn btn-point-deposit">지급하기</button>
    </div>
  </form>
</section>
{% endblock %}
